name: package-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git rust cargo sudo libxkbcommon

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder

      - name: Build package
        run: |
          su builder -c "cd '${GITHUB_WORKSPACE}' && makepkg -f --nodeps"

      - name: Collect build artifacts
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          find "${GITHUB_WORKSPACE}" -maxdepth 1 -type f -name '*.pkg.tar.zst' -exec cp -v {} "${GITHUB_WORKSPACE}/dist/" \;
          find "${GITHUB_WORKSPACE}" -maxdepth 1 -type f -name '*.pkg.tar.zst.sig' -exec cp -v {} "${GITHUB_WORKSPACE}/dist/" \; || true
          ls -lah "${GITHUB_WORKSPACE}/dist"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-niri-desk-package
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: my-niri-desk-package
          path: dist

      - name: Publish rolling release
        if: github.ref_type != 'tag'
        uses: ncipollo/release-action@v1
        with:
          tag: rolling
          name: rolling
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          body: Automated rolling build from ${{ github.sha }}.
          artifacts: "dist/*"

      - name: Publish tagged release
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          body: Automated release build for ${{ github.ref_name }}.
          artifacts: "dist/*"
