# Kitty 基础配置文件
# Font
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# 窗口设置

window_decorations border
corner_radius 12
border_width 2
border_color #4a4a4a

remember_window_size  yes
initial_window_width  1200
initial_window_height 700
tab_bar_style         powerline
tab_bar_edge          bottom

# 边框和圆角设置
window_border_width   2.0
active_border_color   #bd93f9
inactive_border_color #6272a4
bell_border_color     #ff79c6

# 窗口边缘圆角 (如果支持的话)
# 注意：kitty 原生不支持圆角，但可以通过窗口管理器实现
# 以下设置可以改善视觉效果：
window_padding_width  12
draw_minimal_borders  yes

# 主题设置 - 导入 Dracula 主题
include dracula.conf

# 光标设置
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# 鼠标设置
mouse_hide_wait 3.0
default_pointer_shape beam

# 键盘快捷键
# 新建标签页
map ctrl+t new_tab
map ctrl+q close_tab
map ctrl+shift+t new_tab_with_cwd

# 标签页切换
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# 窗口分割
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+\ launch --location=vsplit

# 窗口导航
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# 窗口布局切换
map ctrl+shift+l next_layout

# 字体大小调整
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# 复制粘贴
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection

# 其他快捷键
map ctrl+shift+f show_scrollback
map ctrl+shift+u input_text unicode
map ctrl+shift+k clear_terminal reset active

# 窗口透明度
background_opacity 0.85
dynamic_background_opacity yes

# 启用 URL 超链接
url_prefixes http https file ftp
url_color #00afff

# 终端铃铛
enable_audio_bell no
visual_bell_duration 0.2

# 滚动条
scrollback_lines 10000
scrollback_pager_history_size 0
touch_scroll_multiplier 1.0

# 窗口调整
window_margin_width 0
single_window_margin_width -1
window_border_width 1.0
draw_minimal_borders yes

# 性能设置
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Shell
shell .

# 启动程序
# launch vi
