# 垂直候选列表
Vertical Candidate List=False
# 使用鼠标滚轮翻页
WheelForPaging=True
# 字体
Font="Source Han Sans CN 14"
# 候选框主字体。微信/WPS 这类程序如果候选框太小，通常先从这里加到 15 或 16 试。
# 菜单字体
MenuFont="Adwaita Sans 11"
# 托盘字体
TrayFont="Adwaita Sans SemiBold 10"
# 托盘标签轮廓颜色
TrayOutlineColor=#99c1f1
# 托盘标签文本颜色
TrayTextColor=#ffffff
# 优先使用文字图标
PreferTextIcon=False
# 在图标中显示布局名称
ShowLayoutNameInIcon=True
# 使用输入法的语言来显示文字
UseInputMethodLanguageToDisplayText=True
# 主题
Theme=NiriGlass
# 深色主题
DarkTheme=NiriGlass
# 跟随系统浅色/深色设置
UseDarkTheme=True
# 这里目前没有强制跟系统深色。
# 如果以后你想让输入法候选框更稳定地走深色，可以优先把 UseDarkTheme 改成 True 再观察。
# 当被主题和桌面支持时使用系统的重点色
UseAccentColor=True
# 在 X11 上针对不同屏幕使用单独的 DPI
PerScreenDPI=False
# 固定 Wayland 的字体 DPI
ForceWaylandDPI=0
# 0 = 不强制覆盖，交给环境自己算 DPI。
# 多屏缩放异常时，这一项经常是排错重点。
# 在 Wayland 下启用分数缩放
EnableFractionalScale=True
# 对高分屏 + 多屏环境一般更友好。
