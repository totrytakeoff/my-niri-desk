# hyprlock 锁屏配置
# ---------------------------------------------------------------------------
# 目标：不用 swaylock 那种圆圈状态提示，而是做成更像“正常锁屏面板”的输入框样式。
#
# 注意：
# 1. 这个文件只有在系统安装了 `hyprlock` 后才会生效。
# 2. niri 只是负责通过快捷键启动 hyprlock，本身不解释这个文件。

general {
    hide_cursor = true
    # 锁屏时隐藏鼠标，减少干扰。

    ignore_empty_input = true
    # 空输入不做校验，避免误触回车时闪烁。

    immediate_render = true
    # 尽快渲染锁屏界面，减少锁屏瞬间的空白感。
}

background {
    monitor =
    # 空值表示应用到所有显示器。

    path = @HOME@/.local/share/backgrounds/generated/niri-blur-overview-lock.png
    # 锁屏背景直接复用当前壁纸。

    blur_passes = 0
    blur_size = 0
    brightness = 0.86
    contrast = 1.0
    vibrancy = 0.04
    vibrancy_darkness = 0.0
    # 这几项一起决定锁屏背景“柔和但不糊”的效果。
}

shape {
    monitor =
    size = 380, 92
    # 中间半透明卡片大小。

    color = rgba(17, 20, 26, 0.46)
    rounding = 16
    border_size = 1
    border_color = rgba(188, 198, 210, 0.18)
    # 这是锁屏主面板，不是密码框本身。

    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    # 内建变量，显示当前时间。

    color = rgba(248, 250, 252, 1.0)
    font_size = 90
    font_family = Adwaita Sans
    position = 0, -260
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[zh_CN,简体中文][en_US,English]
    color = rgba(202, 210, 220, 0.96)
    font_size = 19
    font_family = Adwaita Sans
    position = 0, -178
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 46
    # 正常密码框大小；这是你觉得“比圆环更像锁屏”的核心。

    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = 10
    # 输入后显示圆点的外观。

    fade_on_empty = false
    hide_input = true
    # hide_input=false 表示不是完全不可见输入；如果你想更传统的密码框，也可以以后改成 true。

    rounding = 14
    check_color = rgba(168, 184, 199, 0.94)
    fail_color = rgba(212, 139, 131, 0.98)
    capslock_color = rgba(224, 190, 116, 0.98)
    font_color = rgba(242, 246, 250, 1.0)
    inner_color = rgba(34, 38, 47, 0.92)
    outer_color = rgba(190, 202, 214, 0.20)

    placeholder_text = <span foreground="##a8b2bd">Password</span>
    fail_text = <span foreground="##efc1bc">Wrong password</span>
    # fail_text 可继续本地化成中文，但保留 $FAIL 对排错更直接。

    font_family = Adwaita Sans
    position = 0, 220
    halign = center
    valign = center
}

# 常见但目前未启用的方向：
# image {
# }
#   单独叠一层头像 / logo。
#
# label {
#   text = $USER
# }
#   在锁屏中显示当前用户名。
#
# input-field {
#   hide_input = true
# }
#   更传统的密码输入掩码表现。
