[main]
# fuzzel 启动器配置
# ---------------------------------------------------------------------------
# 目标：像一个干净的“应用搜索面板”，而不是一个工具感很强的 dmenu 小条。

font=Adwaita Sans:size=14
terminal=kitty
# 某些 desktop entry 标记为 Terminal=true 时，会通过这里指定的终端启动。

prompt="  "
# 这里故意留空，只保留一点缩进，不显示明显的 `>` 提示符。

placeholder=Search applications
# 占位提示。以后如果你更习惯中文，也可以改成“搜索应用”。

icons-enabled=yes
icon-theme=Adwaita
# 启用图标能明显提升识别速度，尤其是常用图形应用很多的时候。

fields=name,generic,comment,categories
# 搜索匹配字段。当前没有把 exec 加进去，是为了减少噪音。
# 常见可选：
# fields=name,generic,comment,exec,categories

match-mode=fzf
# fzf 模式的匹配手感通常比精确匹配更好。
# 常见可选：exact / fuzzy。

sort-result=yes
show-actions=no
# show-actions=no 表示不把 .desktop 里的 secondary actions 一起列出来，列表更干净。

width=66
lines=15
# 这是你要求放大后的尺寸。
# width 单位是“字符宽度估算”，不是像素。

horizontal-pad=24
vertical-pad=20
inner-pad=14
# 控制四周留白和输入区与结果区之间的呼吸感。

layer=overlay
# overlay 会尽量压在最上面，看起来更像“面板”。
# 常见可选：top。

# 常见但目前未启用的选项：
# anchor=center
#   默认就是 center；如果想固定在顶部可以配 top。
#
# hide-before-typing=yes
#   在没输入前隐藏列表，更极简，但新手不一定喜欢。
#
# dpi-aware=auto
#   多屏缩放复杂时可能需要手调。

[colors]
# 颜色全都用 RGBA 8 位 hex。
background=181a1fee
text=d9dde3ff
prompt=8aa1b4ff
placeholder=7d8793ff
input=f3f5f7ff
match=9bb1c2ff
selection=252932ff
selection-text=f3f5f7ff
selection-match=b8ccd8ff
border=8aa1b433

[border]
width=1
radius=10
# radius 决定整体圆角，和 mako / hyprlock / 窗口圆角保持同一风格语言。
